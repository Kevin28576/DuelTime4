####################################################################################################

# +----------------------------------------------------------------------------------------------+ #
# | Message Settings                                                                             | #
# +----------------------------------------------------------------------------------------------+ #
Message:
  # Prefix shown before plugin chat messages.
  prefix: "&7&l[&bDuelTime4&7&l] "

  # Default language file name (without .yml), must exist in /plugins/DuelTime4/languages
  # Available language codes:
  #  - zh_tw (繁體中文)
  #  - zh_cn (简体中文)
  #  - en_us (English)
  default-language: "en_us"

# +----------------------------------------------------------------------------------------------+ #
# | System Settings                                                                              | #
# +----------------------------------------------------------------------------------------------+ #
System:
  restart-protection:
    # Master switch for restart/shutdown protection mode.
    enabled: true
    # Notify players currently in active battles with title + chat message.
    # Also print detailed restart snapshot logs in console.
    broadcast-message: true

# +----------------------------------------------------------------------------------------------+ #
# | Database Settings                                                                            | #
# +----------------------------------------------------------------------------------------------+ #
Database:
  # MySQL JDBC URL (only used by modules set to mysql below)
  url: jdbc:mysql://localhost:3306/DuelTime4?useSSL=false
  # MySQL username (only used when module type is mysql)
  username: root
  # MySQL password (only used when module type is mysql)
  password: 1234567890
  type:
    # Storage type per module: mysql / sqlite
    # If sqlite is selected, data is stored locally in plugin files.
    arena: "sqlite"
    location: "sqlite"
    shop: "sqlite"
    record: "sqlite"
    player-data: "sqlite"
    blacklist: "sqlite"

# +----------------------------------------------------------------------------------------------+ #
# | Network Integrations                                                                         | #
# +----------------------------------------------------------------------------------------------+ #
Network:
  discord-webhook:
    # Master switch for Discord webhook notifications.
    enabled: false
    # Discord webhook URL. Keep empty to disable actual delivery.
    url: ""
    # Optional webhook sender display name.
    username: "DuelTime4"
    # Optional webhook avatar URL.
    avatar-url: ""
    # HTTP timeouts (milliseconds).
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
    battle-report:
      # Send a report when a classic match ends.
      enabled: true
      # Also send report for draw result.
      include-draw: true
    leave-penalty:
      # Send a notification when leave penalty is applied.
      enabled: true

# +----------------------------------------------------------------------------------------------+ #
# | Arena Settings                                                                               | #
# +----------------------------------------------------------------------------------------------+ #
Arena:
  classic:
    reward:
      # EXP given to winner in classic mode.
      win-exp: 30
      # Point given to winner in classic mode.
      win-point: 1
      # Loser EXP = winner EXP * lose-exp-rate (minimum 0).
      lose-exp-rate: 0.3

    auto-respawn:
      # Enable automatic respawn during classic matches.
      enabled: true
      # Respawn method used by DuelTime4.
      # If your server has issues with auto-respawn, try changing this option first.
      # Available methods:
      # SPIGOT    - respawn via player.spigot().respawn()
      # SETHEALTH - recover player using player.setHealth(player.getMaxHealth())
      # If both methods still do not work on your server, disable auto-respawn.
      code: "SPIGOT"

    delayed-back:
      # Teleport players back after game ends.
      enabled: true
      # Delay seconds before teleporting back (minimum 2).
      time: 5

    streak:
      # Enable win/lose streak tracking updates after each match.
      enabled: true
      # Show current streak message after each match.
      show-message: true
      # Reset streak on draw result.
      reset-on-draw: true

    matchmaking:
      # Seconds players have to confirm when a queue match is found (minimum 5).
      confirm-timeout: 15

      # Command whitelist while player is in an active classic match.
      # Matching rule: if the entered command text contains any keyword below,
      # DuelTime4 will allow that command.
      # Example: if you add "test", "/mycmd test abc" will be allowed.
      command-whitelist: []
      # command-whitelist:
      #   - "test"
      #   - "/dantiao test_whitelist_command1"
      #   - "/dantiao test_whitelist_command2"

      queue-sound:
        # Master switch for queue searching reminder sound.
        enabled: true
        # Allow players to toggle their own queue reminder sound.
        allow-player-toggle: true
        # Play reminder sound every N seconds while player is waiting in queue.
        interval-seconds: 5
        # Bukkit sound enum name.
        sound: "BLOCK_NOTE_BLOCK_PLING"
        # Sound volume (0.0 to 5.0).
        volume: 1.0
        # Sound pitch (0.1 to 2.0).
        pitch: 1.2

      watchdog:
        # Master switch for queue watchdog (stale queue cleanup + match trigger checks).
        enabled: true
        # How often watchdog runs in seconds (minimum 1).
        interval-seconds: 3
        # Remove queued players who are offline.
        cleanup-offline-players: true
        # Remove queued players whose target arena is missing or not WAITING state.
        cleanup-invalid-arena: true
        # Trigger pending-match checks for waiting arenas.
        trigger-match-check: true

      leave-penalty:
        # Master switch for quit/disconnect penalty logic.
        enabled: true
        # Apply penalty when player uses /quit to leave an active match.
        apply-on-quit-command: true
        # Apply penalty when player disconnects during an active match.
        apply-on-disconnect: true
        # Deduct points when leave penalty is triggered.
        apply-point-deduction: true
        # Points deducted when leave penalty is triggered (minimum 0).
        point: 2
        # Apply queue cooldown when leave penalty is triggered.
        apply-queue-cooldown: true
        # Queue cooldown seconds when leave penalty is triggered (minimum 0).
        cooldown: 20

# +----------------------------------------------------------------------------------------------+ #
# | Record Settings                                                                              | #
# +----------------------------------------------------------------------------------------------+ #
Record:
  show:
    # Allow showing duel records in chat.
    enabled: true
    # Cooldown (seconds) between showing records (minimum 0).
    cooldown: 10

  print:
    # Allow printing record to paper item.
    enabled: true
    # Point cost for printing one record (minimum 0).
    cost: 1

# +----------------------------------------------------------------------------------------------+ #
# | Updater Settings                                                                             | #
# +----------------------------------------------------------------------------------------------+ #
Updater:
  # Master switch for update checker and downloader.
  enabled: true
  # Check for updates automatically when plugin starts.
  check-on-startup: true
  # Automatically download new version when startup check finds one.
  # Downloaded file is placed into server update folder and applied on next restart.
  auto-download: false
  # Verify sha256 when manifest provides one.
  verify-sha256: true
  # Remote update manifest URL (YAML format).
  manifest-url: "https://raw.githubusercontent.com/Kevin28576/DuelTime4/refs/heads/main/src/main/java/com/kevin/dueltime4/network/update.yml"
  # Fallback plain-text version URL (legacy format, first line = version).
  fallback-version-url: "https://raw.githubusercontent.com/Kevin28576/DuelTime4/refs/heads/main/src/main/java/com/kevin/dueltime4/network/version"
  # Used when manifest has no download-url.
  # Available placeholder: {version}
  download-url-template: "https://github.com/Kevin28576/DuelTime4/releases/download/v{version}/Dueltime4-Bukkit-{version}.jar"
  # HTTP timeouts (milliseconds).
  connect-timeout-ms: 5000
  read-timeout-ms: 5000

# +----------------------------------------------------------------------------------------------+ #
# | Ranking Settings                                                                             | #
# +----------------------------------------------------------------------------------------------+ #
Ranking:
  # Auto refresh interval for ranking data (seconds, minimum 5).
  auto-refresh-interval: 30

  hologram:
    # Enable ranking holograms.
    enabled: true
    # Max rows shown in hologram.
    size: 10
    # Preferred hologram plugin name.
    # Supported: HolographicDisplay / HolographicDisplays / CMI / DecentHolograms
    plugin: "HolographicDisplays"

# +----------------------------------------------------------------------------------------------+ #
# | Level / Tier Settings                                                                        | #
# +----------------------------------------------------------------------------------------------+ #
Level:
